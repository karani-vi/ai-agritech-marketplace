<!DOCTYPE html>
<html>
<head>
    <title>AI Agritech Marketplace</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f7f2;
            text-align: center;
            padding: 50px;
        }

        h1 {
            color: #2e7d32;
        }

        .card {
            background: white;
            padding: 30px;
            margin: auto;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px 20px;
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1b5e20;
        }

        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🌱 AI Agritech Marketplace</h1>
        <p>Connecting Farmers & Buyers with AI</p>

        <button onclick="checkServer()">Check Server Status</button>

        <p id="result"></p>
    </div>

<script>
function checkServer() {
    fetch("http://localhost:5000/")
    .then(response => response.text())
    .then(data => {
        document.getElementById("result").innerText = data;
    })
    .catch(error => {
        document.getElementById("result").innerText = "Server not reachable ❌";
    });
}
</script>

</body>
</html>
